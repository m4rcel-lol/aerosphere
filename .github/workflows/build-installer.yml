name: build-installer

on:
  push:
    branches: ["main", "work"]
  pull_request:
  workflow_dispatch:

jobs:
  windows-installer:
    runs-on: windows-latest
    env:
      BUILD_CONFIGURATION: Release
      APP_VERSION: 1.0.${{ github.run_number }}
      PUBLISH_DIR: ${{ github.workspace }}\\artifacts\\publish\\win-x64
      INSTALLER_DIR: ${{ github.workspace }}\\artifacts\\installer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install WiX Toolset v3
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Restore
        run: dotnet restore src/AeroSphere.App/AeroSphere.App.csproj

      - name: Publish app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:PUBLISH_DIR" | Out-Null
          dotnet publish src/AeroSphere.App/AeroSphere.App.csproj `
            -c $env:BUILD_CONFIGURATION `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -o "$env:PUBLISH_DIR"

      - name: Prepare WiX output folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:INSTALLER_DIR\\obj" | Out-Null

      - name: Harvest published files for MSI
        shell: pwsh
        run: |
          heat dir "$env:PUBLISH_DIR" `
            -cg AppFiles `
            -dr INSTALLFOLDER `
            -srd -sreg -gg `
            -var var.PublishDir `
            -out "$env:INSTALLER_DIR\\obj\\AppFiles.wxs"

      - name: Build MSI
        shell: pwsh
        run: |
          candle installer/wix/Product.wxs "$env:INSTALLER_DIR\\obj\\AppFiles.wxs" `
            -arch x64 `
            -dAppVersion=$env:APP_VERSION `
            -dPublishDir="$env:PUBLISH_DIR" `
            -out "$env:INSTALLER_DIR\\obj\\"

          light "$env:INSTALLER_DIR\\obj\\Product.wixobj" "$env:INSTALLER_DIR\\obj\\AppFiles.wixobj" `
            -ext WixUIExtension `
            -cultures:en-us `
            -out "$env:INSTALLER_DIR\\AeroSphere.msi"

      - name: Build EXE bootstrapper
        shell: pwsh
        run: |
          candle installer/wix/Bundle.wxs `
            -ext WixBalExtension `
            -dAppVersion=$env:APP_VERSION `
            -dMsiPath="$env:INSTALLER_DIR\\AeroSphere.msi" `
            -out "$env:INSTALLER_DIR\\obj\\"

          light "$env:INSTALLER_DIR\\obj\\Bundle.wixobj" `
            -ext WixBalExtension `
            -out "$env:INSTALLER_DIR\\AeroSphere-Setup.exe"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aerosphere-installer-${{ github.run_number }}
          path: |
            artifacts/installer/AeroSphere.msi
            artifacts/installer/AeroSphere-Setup.exe
          if-no-files-found: error
